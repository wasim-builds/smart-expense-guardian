services:
  - type: web
    name: smart-expense-guardian-api
    env: docker
    dockerContext: .
    dockerfilePath: backend/Dockerfile
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: smart-expense-guardian-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          type: redis
          name: smart-expense-guardian-redis
          property: connectionString
      - key: CELERY_BROKER_URL
        fromService:
          type: redis
          name: smart-expense-guardian-redis
          property: connectionString
      - key: CELERY_RESULT_BACKEND
        fromService:
          type: redis
          name: smart-expense-guardian-redis
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: CORS_ORIGINS
        value: "https://your-vercel-domain.vercel.app" # REPLACE THIS AFTER VERCEL DEPLOYMENT

  - type: redis
    name: smart-expense-guardian-redis
    ipAllowList: [] # only allow internal connections

databases:
  - name: smart-expense-guardian-db
    databaseName: smart_expense
    user: seg_user
