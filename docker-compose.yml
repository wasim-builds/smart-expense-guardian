version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: seg_postgres
    environment:
      POSTGRES_USER: seg_user
      POSTGRES_PASSWORD: seg_password
      POSTGRES_DB: smart_expense
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: seg_redis
    ports:
      - "6379:6379"
    restart: unless-stopped

  rabbitmq:
    image: rabbitmq:3-management-alpine
    container_name: seg_rabbitmq
    environment:
      RABBITMQ_DEFAULT_USER: seg_user
      RABBITMQ_DEFAULT_PASS: seg_password
    ports:
      - "5672:5672"
      - "15672:15672"
    restart: unless-stopped

volumes:
  postgres_data:
