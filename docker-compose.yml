version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: seg_postgres
    environment:
      POSTGRES_USER: seg_user
      POSTGRES_PASSWORD: seg_password
      POSTGRES_DB: smart_expense
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U seg_user -d smart_expense"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: seg_redis
    ports:
      - "6379:6379"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  rabbitmq:
    image: rabbitmq:3-management-alpine
    container_name: seg_rabbitmq
    environment:
      RABBITMQ_DEFAULT_USER: seg_user
      RABBITMQ_DEFAULT_PASS: seg_password
    ports:
      - "5672:5672"
      - "15672:15672"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: seg_api
    command: uvicorn backend.main:app --host 0.0.0.0 --port 8000
    environment:
      - DATABASE_URL=postgresql://seg_user:seg_password@db:5432/smart_expense
      - REDIS_URL=redis://redis:6379/0
      - CELERY_BROKER_URL=amqp://seg_user:seg_password@rabbitmq:5672//
      - CELERY_RESULT_BACKEND=redis://redis:6379/0
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    restart: unless-stopped

  worker:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: seg_worker
    command: celery -A backend.workers.celery_app.celery worker --loglevel=info
    environment:
      - DATABASE_URL=postgresql://seg_user:seg_password@db:5432/smart_expense
      - REDIS_URL=redis://redis:6379/0
      - CELERY_BROKER_URL=amqp://seg_user:seg_password@rabbitmq:5672//
      - CELERY_RESULT_BACKEND=redis://redis:6379/0
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: seg_frontend
    ports:
      - "80:80"
    depends_on:
      - api
    restart: unless-stopped

volumes:
  postgres_data:
